<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">AI Study Planner logo</title>
  <defs>
    <linearGradient id="g1" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="60%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F766E" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- rounded tile background -->
  <rect x="6" y="6" width="108" height="108" rx="20" fill="url(#g1)" filter="url(#s)" />

  <!-- open book base -->
  <g transform="translate(24,28)">
    <path d="M0 6 C12 2, 36 2, 60 6 L60 52 C36 48, 12 48, 0 52 Z" fill="rgba(255,255,255,0.06)"/>
    <path d="M4 8 C14 6, 36 6, 56 8 L56 48 C36 46, 14 46, 4 48 Z" fill="url(#g2)" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
    <!-- pages lines -->
    <g fill="none" stroke="rgba(15,118,110,0.12)" stroke-width="1">
      <path d="M8 16 L52 16" />
      <path d="M8 22 L52 22" />
      <path d="M8 28 L52 28" />
    </g>
  </g>

  <!-- AI circuit node on top right of book -->
  <g transform="translate(66,30)">
    <circle cx="6" cy="6" r="6" fill="#fff" opacity="0.95" />
    <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
      <path d="M6 0 L6 -8" transform="translate(0,10) rotate(0)" />
      <path d="M6 6 L14 6" />
      <path d="M6 6 L6 14" />
    </g>
    <circle cx="6" cy="6" r="2.2" fill="url(#g1)" />
  </g>

</svg>
